<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Quiz game</title>
</head>
<body>
    <div class="page">

        <div class="screen" id="first-screen">

            <h1>
                Quiz Time!
            </h1>
            <p>test your knowledge with these fun question</p>

            <button id="start-quiz">Start quiz</button>

        </div>
        <div class="screen" id="question">

            <p>Question</p>
            <div class="score-container"">
                <p>question <span>0</span> of <span>5</span></p>
                <p>score</p>
            </div>
            <div class="answers">
                <button class="answer-btn">not an answer</button>
                <button class="answer-btn">not an answer</button>
                <button class="answer-btn">not an answer</button>
                <button class="answer-btn">the answer</button>
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>

        <div class="screen active" id="end">

            <h1>Quiz Results</h1>

            <div class="final-res">

                <p class="final-score">you scored <span>0</span> of <span>5</span></p>
                <p class="message">you are idiot</p>
            </div>
            <button class="restart-btn">Restart Quiz</button>
            
        </div>

    </div>
</body>
</html>
