<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Quiz game</title>
</head>
<body>
    <div class="page">

        <div class="screen active" id="start-screen">

            <h1>
                Quiz Time!
            </h1>
            <p>test your knowledge with these fun question</p>

            <button id="start-btn">Start quiz</button>

        </div>
        <div class="screen" id="quiz-screen">

            <p id="question-text">Question</p>
            <div class="score-container"">
                <p>question <span id="question">0</span> of <span id="total-questions">0</span></p>
                <p>score: <span id="score"></span></p>
            </div>
            <div id="answers">
                
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>

        <div class="screen " id="result-screen">

            <h1>Quiz Results</h1>

            <div class="final-res">

                <p class="final-score">you scored <span id="final-score">0</span> of <span id="max-score">5</span></p>
                <p id="message"></p>
            </div>
            <button id="restart-btn">Restart Quiz</button>
            
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
